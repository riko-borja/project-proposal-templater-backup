gthAdjust="spacing" textLength="99.6709" x="320.0513" y="233.9561">Document Role:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="212.437" x="423.334" y="233.9561">Specifies access level to documents.</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="113.3809" x="172.7295" y="170.2109"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="93.3809" x="182.7295" y="192.668">Enter user details</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="159.2363" x="149.8018" y="261.8125"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="139.2363" x="159.8018" y="284.2695">Click "Create User" button</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="192.7578" x="133.041" y="316.9063"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="172.7578" x="143.041" y="339.3633">System validates entered details</text><polygon fill="#F1F1F1" points="174.0815,372,284.7583,372,296.7583,384,284.7583,396,174.0815,396,162.0815,384,174.0815,372" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="110.6768" x="174.0815" y="388.501">Validation Successful?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="17.1177" x="144.9639" y="381.583">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="12.2354" x="296.7583" y="381.583">no</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="196.0801" x="11" y="406"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" 